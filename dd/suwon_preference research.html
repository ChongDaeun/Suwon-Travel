<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행궁동 나들이 신청서</title>
  <link rel="stylesheet" href="css/preference research.css">
</head>
<body>
  <div id="container">
    <h1>행궁동 나들이 신청서</h1>
      <form action="">
        <fieldset>
          <legend>개인정보</legend>        
            <ul>
              <label for="u-name">이름</label>
              <input type="text" id="u-name">
            </ul>

            <ul>
              <label for="u-phone">전화번호</label>
              <input type="tel" id="u-phone" placeholder="- 사용해서 입력해 주세요. (ex. 010-1234-2345)">
            </ul>
            
            <ul>
              <label for="gender">성별</label>
              <input type="radio" id="gender" name="female">여자
              <input type="radio" id="gender" name="male">남자
            </ul>
            
            <ul>
              <label for=""></label>
              <input type="text">
            </ul>

          
        </fieldset>








      </form>
  </div>

  <div id="bottom">
    <input type="submit" value="신청하기">
    <input type="reset" value="취소하기">
  </div>
</body>
</html>
