<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행궁동 나들이 신청서</title>
  <link rel="stylesheet" href="css/preference research.css">
</head>
<body>
  <div id="container">
    <h1>행궁동 나들이 신청서</h1>
      <form action="item">      
            <img src="" alt="">
              <label for="u-name">이름</label>
              <input type="text" id="u-name">

              <label for="u-phone">전화번호</label>
              <input type="tel" id="u-phone" placeholder="- 사용해서 입력해 주세요. (ex. 010-1234-2345)">
            
              <label>성별</label>
              <label><input type="radio" name="gender" value="male">남성</label>
              <label><input type="radio" name="gender" value="female">여성</label>
            
              <label for="location">거주지</label>
              <select name="location" id="location">
                <option value="seoul">서울특별시</option>
                <option value="">광주광역시</option>
                <option value="">대구광역시</option>
                <option value="">대전광역시</option>
                <option value="">부산광역시</option>
                <option value="">세종특별자치시</option>
                <option value="">울산광역시</option>
                <option value="">인천광역시</option>
                <option value="">강원특별자치도</option>
                <option value="">경기도</option>
                <option value="">경상남도</option>
                <option value="">경상북도</option>
                <option value="">전라남도</option>
                <option value="">전북특별자치도</option>
                <option value="">충청남도</option>
                <option value="">충청북도</option>
                <option value="">제주특별자치도</option>
              </select>

              <label for="reasons">신청 사유</label>
              <textarea name="reasons" id="reasons" cols="50" rows="7" placeholder="행궁동 나들이를 신청하게 된 계기를 100자 이상 적어주세요."></textarea>

              <label for="wishlist">희망사항</label>
              <textarea name="wishlist" id="wishlist" cols="50" rows="7" placeholder="행궁동 나들이 모임에 바라는 점을 100자 이상 적어주세요.."></textarea>
      </form>
  </div>

  <div id="bottom">
    <input type="submit" value="신청하기">
    <input type="reset" value="취소하기">
  </div>
</body>
</html>
